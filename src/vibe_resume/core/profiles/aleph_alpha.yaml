- 1-2 pages; English primary
- Publications and OSS / model releases surfaced at the top
- On-prem / sovereign-deployment experience explicitly named when present
keyword_anchors:
- sovereign AI
- on-prem
- PhariaAI
- Luminous
- AtMan
- explainability
- GDPR
- PyTorch
- German
- regulated
enrich_bias: >-
  This résumé will be reviewed by Aleph Alpha. Surface sovereign / on-prem
  AI deployment awareness and GDPR compliance — these are Aleph Alpha's
  product differentiators versus US frontier labs. Explainability and
  attribution research aligns with the PhariaAI / Luminous product line
  (AtMan, attribution-as-a-service); Aleph Alpha's 2024 pivot toward the
  PhariaAI enterprise OS should shape keyword emphasis.
  European-language / German NLP experience is a culture-fit positive.
review_tips: >-
  Aleph Alpha reviewers filter on sovereign-deployment awareness +
  regulated-industry experience + explainability research. Flag: consumer-
  API LLM framing, missing GDPR / compliance dimension for enterprise roles,
  ML research without attribution / interpretability angles for
  PhariaAI / Luminous-adjacent positions.
