key: 91app
label: 91APP
tier: tw_local
locale_hint: zh_TW
must_haves:
- >-
  電商 SaaS / O2O 整合經驗 —— 91APP 的核心是品牌官網與 POS / 會員 /
  訂單跨通路資料整合
- 前端工程師具備 React / Vue 實作深度,面試含現場實作題(手寫元件、資料流)
- 後端熟悉 .NET / C# 或主流電商後台技術棧 (支付、金流、物流串接)
plus_signals:
- 雙 11 / 週年慶 / 節慶流量高峰的壓測與災備實戰經驗
- >-
  品牌電商上線導入經驗 (91APP 公開合作品牌包括 Adidas、寶雅、全家、
  Levi's、華歌爾、The North Face、Timberland 等)
- 全通路整合 (官網 + APP + POS + LINE) 的資料同步 / 事件設計
- 跨團隊協作 (業務 + 品牌 + 客服) 的需求收斂經驗
red_flags:
- 履歷形容詞過多 (熟悉 / 精通 / 負責) 無量化支持 —— 104 風格常見地雷
- 只描述任務而非成果 —— 工作內容無 outcome line
- 大型品牌整合經驗為零的資深工程師,對 91APP 客群匹配度偏低
format_rules:
- 中文 (zh_TW) 履歷為主,可附中英對照
- 1-2 頁,反向時序;每段工作需含公司 + 時間 + 技術棧 + 量化成果
- 前端角色建議附 GitHub 或作品集連結
keyword_anchors:
- 電商 SaaS
- O2O
- 全通路
- React
- .NET
- 金流串接
- 雙11
- 品牌官網
enrich_bias: >-
  這份履歷將由 91APP 審閱。以繁體中文輸出。每段經歷要明確寫出公司、職稱、
  時間、技術棧,以及「量化成果」(流量峰值、訂單量、轉換率、系統延遲、
  上線品牌數)。替換掉「熟悉 / 精通 / 負責」這類形容詞,改用動詞+數字。
  若有雙 11 高峰、品牌電商上線、全通路資料整合的實戰經驗,優先擺在最前面。
review_tips: >-
  91APP 審閱者會在形容詞地雷、成果量化、品牌/流量規模三面向把關。Flag:
  「熟悉 / 精通 / 負責」密度過高且無數字;工作描述只有任務沒有 outcome;
  資深工程師履歷無高流量或品牌整合經驗。
last_verified_at: '2026-04-21'
