key: moneyforward
label: Money Forward
tier: jp
locale_hint: ja_JP
must_haves:
- >-
  個人家計・法人会計いずれかの金融ドメインへの理解 —— Money Forward の
  プロダクト群 (ME / クラウド / ビジネスカンパニー) は PFM と B2B SaaS の
  両軸で動く
- Go / Ruby / TypeScript の本番運用経験
- 銀行 API / スクレイピング / 口座連携のいずれかの経験 (Money Forward の
  中核機能)
plus_signals:
- Fintech / PFM / 家計簿サービス / 会計ソフトのドメイン経験
- マイクロサービス基盤の設計・運用経験 (Money Forward はモノリス→MSA 移行が
  進行中)
- API セキュリティ・認可・多要素認証の実装経験
- M&A 後の技術統合経験 (Money Forward はグループ会社が多い)
red_flags:
- Fintech ドメイン経験ゼロかつ学ぶ姿勢が見えない
- セキュリティ・認可への感度が弱い (金融データを扱う前提が抜けている)
- グループ会社統合やレガシー移行の耐性が見えない
format_rules:
- 履歴書 + 職務経歴書 両方推奨
- 1-3 ページ、反時系列
- 金融・会計ドメインの経験があれば上位に配置、API 連携件数を数字で示す
keyword_anchors:
- PFM
- 家計簿
- 会計
- Go
- Rails
- 銀行API
- MSA
- Fintech
enrich_bias: >-
  この履歴は Money Forward 向けにレビューされる。PFM (個人家計) と B2B 会計
  の両軸を意識し、金融ドメイン経験があれば上位に配置する。銀行 API 連携・
  口座スクレイピング・認可基盤のいずれかの実装経験は Money Forward の中核
  機能に直結するため、具体的な件数・トランザクション数で示す。
review_tips: >-
  Money Forward のレビュアーは Fintech ドメインとセキュリティ感度を両立で
  見る。金融データを扱う前提が抜けた履歴、グループ統合経験の欠如 (シニア
  向け)、銀行連携の経験ゼロはフラグ対象。M&A 後の技術統合経験は差別化要因。
