key: dena
label: DeNA
tier: jp
locale_hint: ja_JP
must_haves:
- >-
  技術力だけでは通らない —— DeNA の人事が公に語る通り、内定には事業理解と
  コミュニケーション力が技術力と同等に必要
- 職務経歴書にプロジェクト間のストーリー性 (なぜ移ったか、何を学んだか)
- ゲーム / モバイル / ヘルスケア / オートモーティブのいずれかのドメイン隣接
plus_signals:
- GitHub / 技術ブログ / 登壇 などの公開アーティファクト
- プロデューサー・プランナー・デザイナーとの共創経験
- 新規事業の 0→1 / 1→10 フェーズでの意思決定経験
- Go / Ruby / Swift / Kotlin の本番運用経験
red_flags:
- 技術力は強いがコミュニケーション・事業貢献の記述が皆無
- 職務経歴書が箇条書きで経歴間のストーリーが無い
- DeNA の事業領域 (ゲーム / Pococha / Anyca / ヘルスケア) への関心が見えない
format_rules:
- 履歴書 + 職務経歴書 両方、職務経歴書は 1-3 ページ
- 反時系列、プロジェクトごとに チーム構成 + 役割 + 意思決定 + 成果
- GitHub・技術ブログ URL を目立つ位置に配置
keyword_anchors:
- ゲーム
- Pococha
- ヘルスケア
- Go
- Ruby
- Swift
- 事業理解
- 職務経歴書
enrich_bias: >-
  この履歴は DeNA 向けにレビューされる。技術力だけでなく事業理解と
  コミュニケーション力を同等に見られるため、職務経歴書の各ロールで
  「なぜその選択をしたか」「誰と組んで何を決めたか」を明記する。
  プロジェクト間の移動理由を繋がったストーリーとして書く。GitHub と
  技術ブログのリンクは目立つ位置に配置する。
review_tips: >-
  DeNA のレビュアーは技術単体を評価しない。技術力のみで事業貢献の記述が
  無い履歴、ストーリー性の無い職務経歴書、公開アーティファクトの無い
  シニア応募はフラグ対象。事業領域への関心が見えることを最優先で確認する。
