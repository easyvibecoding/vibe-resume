key: kakao
label: Kakao
tier: kr
locale_hint: ko_KR
must_haves:
- >-
  Hangul-first résumé with English technical terms in parentheses — Korean ATS scans Hangul
  first, then English equivalents
- >-
  Demonstrated scale experience (KakaoTalk holds ~90%+ Korean-messenger
  user share; the parent company operates banking, pay, games, and mobility
  at comparable domestic scale)
- Clear tenure timeline with month-level precision
plus_signals:
- >-
  Prior experience at a top Korean tech peer (Naver / Kakao / Line /
  Coupang / Baedal Minjok / Danggeun / Toss) — recognised lineage signal
  across the Korean tech network
- Kakao / KakaoBank / KakaoPay / KakaoGames ecosystem work
- High-QPS backend, messaging, or payments experience
red_flags:
- English-only résumé without Hangul fallback — misses the Korean ATS first pass
- >-
  Missing photo in traditional submission channels (photo is standard for most Korean résumés)
- >-
  No mention of tenure duration — Korean reviewers read this alongside the company name
format_rules:
- Hangul primary + English tech terms; photo commonly expected
- Reverse-chronological; company names in Korean with English short forms
- 1-2 pages
keyword_anchors:
- 카카오
- 대규모 트래픽
- 백엔드
- 메시징
- 결제
- Java
- Kotlin
- MSA
enrich_bias: >-
  This résumé will be reviewed by Kakao. Produce Korean (Hangul) as the primary language with
  English technical terms in parentheses — Korean ATS scans Hangul first. Surface scale (QPS,
  DAU, messaging volume) using numerical values that match Kakao's own product scale. If the
  candidate has prior experience at a top Korean tech peer (Naver / Line / Coupang / Baedal /
  Danggeun / Toss), it is a recognised lineage signal — name the company plainly.
review_tips: >-
  Kakao reviewers scan for Hangul primary + scale numbers + top-Korean-tech lineage. Flag:
  English-only résumé; missing tenure months; backend roles without a QPS / DAU /
  messaging-volume scale line.
