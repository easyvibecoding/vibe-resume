key: freee
label: freee
tier: jp
locale_hint: ja_JP
must_haves:
- >-
  会計・人事労務・確定申告など、バックオフィス業務ドメインへのリスペクト
  —— freee は 税制・法令・会計原則への忠実な実装を重視する
- Ruby / Rails または Go の本番運用経験 (freee の主要サーバサイドスタック)
- マイクロサービス・API 連携の設計経験
plus_signals:
- 中小企業・個人事業主向けプロダクトの運用経験 (freee の主要顧客層)
- 銀行・カード・e-Tax などの外部システム連携の実装経験
- AI / 自動化 による経理・帳簿処理の効率化プロジェクト
- スモールビジネスを支えるというミッションへの共感 (採用面接で確認される)
red_flags:
- 会計・税制ドメインへの関心が履歴書からまったく読み取れない
- B2B SaaS 経験ゼロで大規模消費者サービスの経歴のみ
- 法令コンプライアンスに関する感度が見えない (金融系プロダクトには必須)
format_rules:
- 履歴書 + 職務経歴書 両方推奨 (エンジニア職でも職務経歴書で深掘り)
- 1-3 ページ、プロジェクト単位、反時系列
- 技術スタック + ドメイン + 成果数字 を各プロジェクトに記載
keyword_anchors:
- 会計
- 税制
- freee
- Rails
- Go
- 外部システム連携
- B2B SaaS
- 中小企業
enrich_bias: >-
  この履歴は freee 向けにレビューされる。会計・税制・労務といったバック
  オフィス業務ドメインへのリスペクトを前面に出し、外部システム連携 (銀行・
  カード・e-Tax) の経験を具体的な API 件数や処理件数で示す。スモール
  ビジネスを支えるミッションに対する動機を職務経歴書の要約に含める。
review_tips: >-
  freee のレビュアーはドメインへの本気度を厳しく見る。会計・税制・コンプライ
  アンスへの感度が無い履歴、B2B SaaS 経験の無さ、ミッション共感の欠如は
  フラグ対象。AI / 自動化による経理効率化の経験は強い差別化要因。
