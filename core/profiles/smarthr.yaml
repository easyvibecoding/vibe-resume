key: smarthr
label: SmartHR
tier: jp
locale_hint: ja_JP
must_haves:
- >-
  履歴書 + 職務経歴書 の両方が必須 —— SmartHR の書類選考ではエンジニア職も
  職務経歴書を読み込んで面接で深掘りする
- >-
  SaaS 労務管理ドメインへの適応能力 —— 制度・法令改正への追随、マルチテナント、
  顧客データ移行の経験が活きる
- Ruby / Rails または TypeScript/React の本番運用経験
plus_signals:
- HR Tech / 労務 / 給与計算などバックオフィス SaaS のドメイン経験
- マルチテナント設計、認可モデル、監査ログの実装経験
- 英語での非同期ドキュメンテーション能力 (SmartHR は英語圏採用も進行)
- アクセシビリティ対応のプロダクト開発経験
red_flags:
- 履歴書が形式的で個性のない記述のみ —— 面接で 職務経歴書 を読み込まれるため
  両方が整合していないと減点
- 役職と期間だけで、プロジェクトのストーリーが繋がっていない経歴
- バックオフィス SaaS の制度変更への耐性・責任感が見えない記述
format_rules:
- 履歴書 + 職務経歴書 両方必須、書類選考で両方を読み込まれる
- 職務経歴書は 1-3 ページ、プロジェクト単位に 期間・会社・役割・技術・成果
- 面接では職務経歴書の内容を根拠に深掘りされる前提で記述する
keyword_anchors:
- 労務
- HR Tech
- Rails
- TypeScript
- マルチテナント
- 職務経歴書
- アクセシビリティ
- SaaS
enrich_bias: >-
  この履歴は SmartHR 向けにレビューされる。履歴書と職務経歴書の両方を揃え、
  職務経歴書はプロジェクト単位のグリッド (期間・会社・役割・技術・成果) で
  書く。エンジニア面接官が職務経歴書を起点に深掘り質問をする前提で、各
  プロジェクトに技術選定理由と成果数字を付ける。HR Tech / 労務ドメインの
  経験があれば上位に配置する。
review_tips: >-
  SmartHR のレビュアーは職務経歴書を面接の深掘り素材として扱う。履歴書が
  形式的すぎる、プロジェクト間のストーリーが分断している、制度変更への
  適応力が見えない履歴はフラグ対象。マルチテナント・監査・アクセシビリティ
  のいずれかの経験は差別化要因。
last_verified_at: '2026-04-21'
