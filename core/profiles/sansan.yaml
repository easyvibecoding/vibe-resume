key: sansan
label: Sansan
tier: jp
locale_hint: ja_JP
must_haves:
- >-
  名刺データ化 / データ抽出 / OCR / エンティティ解決のいずれかのバックグランド
  —— Sansan の中核技術はカード画像からの構造化データ抽出
- >-
  Ruby / Rails 主軸のサーバサイド経験 —— Sansan の公開スタックは
  Ruby ドミナント (Eight は Rails、Bill One は TypeScript/Express);
  C# / .NET / Go / Kotlin は副スタックとして歓迎
- B2B SaaS プロダクトの運用経験
plus_signals:
- OCR・画像処理・NLP・エンティティマッチングの研究開発経験
- Eight / Sansan / Bill One いずれかのドメイン隣接経験
- データクレンジング・正規化パイプラインの設計経験
- 社会的インフラ志向 (Sansan の「出会い」データベースというミッション共感)
red_flags:
- OCR・データ抽出・NLP のどれにも触れたことが無い AI 系応募
- B2C 経験のみで B2B SaaS の運用経験ゼロ
- データ品質・エンティティ解決への感度が見えない
format_rules:
- 履歴書 + 職務経歴書 両方推奨
- 1-3 ページ、反時系列
- 機械学習系プロジェクトは データ規模 + モデル + 評価指標 + 本番投入有無
  を明記
keyword_anchors:
- 名刺
- OCR
- エンティティ解決
- Rails
- Ruby
- TypeScript
- B2B SaaS
- NLP
- データクレンジング
enrich_bias: >-
  この履歴は Sansan 向けにレビューされる。名刺データ化・OCR・NLP・エンティ
  ティ解決のいずれかの経験を上位に配置し、データ規模と精度数字を明記する。
  Sansan の主力は Ruby / Rails (Eight / Sansan) + TypeScript (Bill One);
  主軸での深さを示しつつ、C# / .NET / Go / Kotlin などの副スタック経験も
  添える。「出会い」というミッションへの共感を職務経歴書の要約で表現する。
review_tips: >-
  Sansan のレビュアーはデータ抽出 / OCR / NLP の技術深度とミッション共感の
  両方を見る。OCR・データ品質・エンティティ解決の経験がない AI 系応募、
  B2B SaaS 運用未経験のシニア、データ精度指標の欠如はフラグ対象。
last_verified_at: '2026-04-21'
