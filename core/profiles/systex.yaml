key: systex
label: 精誠資訊 / Systex
tier: tw_local
locale_hint: zh_TW
must_haves:
- >-
  大型企業客戶整合經驗 —— 精誠服務逾 30,000 家企業客戶,以金融、製造、
  政府、電信為核心
- 雙軌職涯 (專業職 / 管理職) 任一軌的自覺 —— 履歷要清楚顯示技術深度或
  團隊管理任一面向
- Java / .NET / Oracle / SQL Server / SAP 等企業級技術棧
plus_signals:
- 銀行、保險、證券的核心系統整合經驗 (精誠主力領域)
- SAP / Oracle / Salesforce 等大型套裝軟體導入專案
- 資訊安全、合規、稽核的感度與實作經驗
- 台灣以外 (中國、東南亞) 的海外分公司 / 客戶服務經驗
red_flags:
- 純新創經歷無大型企業導入專案證明
- 技術形容詞過多 (熟悉 / 精通 / 負責) 無量化支持
- 工作內容只寫任務沒有 outcome (104 地雷)
- 管理職應徵卻無團隊規模或預算數字
format_rules:
- 中文履歷為主,技術名詞採中英對照
- 1-2 頁反向時序;每個專案列 客戶產業 + 時間 + 技術棧 + 團隊規模 + 成果
- 雙軌選擇 (專業 / 管理) 在履歷要清楚表態
keyword_anchors:
- 精誠
- SI
- 金融
- 保險
- SAP
- Oracle
- 系統整合
- 雙軌
enrich_bias: >-
  這份履歷將由精誠資訊審閱。繁體中文為主,技術名詞中英對照。依履歷主人
  的職涯方向選擇專業職或管理職敘事 —— 專業職側重技術深度與客戶專案多樣性,
  管理職側重團隊規模與交付預算。銀行 / 保險 / 政府導入專案的成果要量化
  (用戶數、交易量、導入期程縮短)。
review_tips: >-
  精誠審閱者會從企業級穩定性 + 雙軌方向明確 + 量化成果三面把關。Flag:
  形容詞地雷、無大型企業整合專案、管理職應徵但無團隊規模、工作描述只有
  任務沒有 outcome。金融與 SAP/Oracle 整合經驗是明確差異化。
