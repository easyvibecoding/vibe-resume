key: revolut
label: Revolut
tier: eu
locale_hint: en_US
must_haves:
- >-
  Very-fast-shipping mindset — Revolut's engineering culture is aggressive
  cadence + large scope per IC
- >-
  Java / Kotlin + Spring Boot backend depth — Revolut's dominant server
  stack (Python is prominent for ML / data / automation, not primary
  backend)
- Comfort with rapid product iteration and high-ambiguity projects
plus_signals:
- Prior Rev-celerator graduate-programme or equivalent fast-scale fintech path
- Banking licence / compliance / KYC / AML system experience
- Multi-product / multi-country deployment (Revolut operates in most of Europe,
  UK, US, AU, JP, SG)
- Greenfield product launches with measurable user-growth contribution
red_flags:
- Slow-cadence enterprise track with no rapid-iteration evidence
- Pure ops / consulting résumé for IC engineering roles
- Missing scale or scope markers — Revolut expects large blast-radius ownership
  per IC
format_rules:
- 1-2 pages, no photo
- Per-role scope line — how many products, how many countries, how many users
- Velocity evidence — time-from-idea-to-ship, shipping cadence per quarter
keyword_anchors:
- Java
- Kotlin
- Spring Boot
- Python
- fintech
- KYC
- AML
- multi-country
- Rev-celerator
enrich_bias: >-
  This résumé will be reviewed by Revolut. Lean into velocity and scope —
  how many products launched per year, how many countries, how fast from
  concept to production. Java / Kotlin + Spring Boot is the backend
  baseline; Python is strong for ML / data / automation; banking-
  regulation fluency (KYC / AML / licence-specific work) is a clear
  differentiator. Avoid slow-cadence enterprise framing.
review_tips: >-
  Revolut reviewers read for velocity + per-IC scope + fintech-regulation
  fluency + JVM backend depth. Flag: slow-cadence narratives, missing
  country / product breadth for senior roles, and non-JVM-dominant backend
  résumés without a clear reason (e.g. ML / data role) to be in the funnel.
last_verified_at: '2026-04-21'
