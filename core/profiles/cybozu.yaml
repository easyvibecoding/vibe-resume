key: cybozu
label: Cybozu / サイボウズ
tier: jp
locale_hint: ja_JP
must_haves:
- >-
  チームワーク志向の働き方への共感 —— Cybozu は「チームワークあふれる社会」を
  ミッションとし、kintone / Garoon / Office などのコラボレーションツールを提供
- Java / Go / TypeScript / React のいずれかの本番運用経験
- リモート・多様な勤務形態への適応力 (Cybozu は働き方の多様性で有名)
plus_signals:
- B2B SaaS プロダクトの長期運用経験 (kintone は 15 年以上の歴史)
- ローコード / ノーコードプラットフォームの設計経験
- 多拠点・海外拠点 (ベトナム、中国、米国) との協働経験
- 公開 OSS 貢献 (Cybozu は OSS 活動を社内公認)
red_flags:
- チームワーク・働き方への関心が履歴書から見えない
- 高速回転スタートアップ前提の履歴で、長期プロダクト運用への感度が低い
- 海外拠点との協働記述がゼロ (グローバル開発のシニア向けは減点)
format_rules:
- 履歴書 + 職務経歴書 両方推奨、1-3 ページ反時系列
- プロジェクト単位でチーム構成・意思決定・成果を記述
- 働き方・勤務形態の希望があれば明記 (Cybozu はそれを尊重する文化)
keyword_anchors:
- kintone
- Garoon
- Java
- Go
- B2B SaaS
- チームワーク
- リモート
- 多様性
enrich_bias: >-
  この履歴は Cybozu 向けにレビューされる。チームワークと多様な働き方への
  共感を職務経歴書の要約で示し、B2B SaaS プロダクトの長期運用経験があれば
  上位に配置する。多拠点 / 海外拠点との協働経験は Cybozu のグローバル開発
  体制に直結するため具体的に書く。OSS 活動は差別化要因。
review_tips: >-
  Cybozu のレビュアーは働き方とチームワークへの共感を技術深度と同等に
  見る。スタートアップ前提の速度観のみ、長期プロダクト運用の感度欠如、
  多様性や海外協働への関心ゼロはフラグ対象。
last_verified_at: '2026-04-21'
