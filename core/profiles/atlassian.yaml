key: atlassian
label: Atlassian
tier: us_tier2
locale_hint: en_US
must_haves:
- >-
  Comfort with structured competency-based interviews — Atlassian's engineering
  loop combines Coding + System Design + Manager rounds with a dedicated
  Craft interview (role-specific technical execution) and a Values interview
  (teamwork / impact against published company values), so bullets should map
  cleanly to both Craft and Values signals
- Java or Kotlin backend depth for platform roles; React / TypeScript for
  product-frontend roles
- SaaS collaboration / productivity domain familiarity (Jira, Confluence,
  Bitbucket, Trello ecosystem signals)
plus_signals:
- >-
  Remote / async working evidence — Atlassian's "Team Anywhere" policy is
  distributed-friendly with hybrid options; not every role is fully remote
- Migration from data-centre to cloud (the Atlassian Cloud platform migration
  is the dominant multi-year theme)
- Developer-experience / internal-platform work
- Open-source contributions to JVM ecosystems or collaboration tools
red_flags:
- >-
  Résumé with no explicit values or craft alignment — competency-based
  rounds look for both technical execution (Craft) and teamwork-and-values
  evidence, not just one
- In-office-only career with no async / remote-work evidence for fully-
  distributed roles
- Missing SaaS-collaboration domain exposure for product-team roles
format_rules:
- 1-2 pages, no photo
- >-
  Bullets map to Atlassian's two named specialist interviews — Craft
  (role-specific technical execution) and Values (teamwork / impact) —
  with level-specific scope carried by the Coding / System Design / Manager
  rounds that surround them
- Remote / async collaboration evidence surfaced explicitly when present
keyword_anchors:
- Atlassian
- Jira
- Confluence
- Kotlin
- Java
- React
- remote
- async
enrich_bias: >-
  This résumé will be reviewed by Atlassian. Structure bullets to produce
  strong signals for Atlassian's two named specialist interviews — Craft
  (role-specific technical execution) and Values (teamwork + impact against
  Atlassian's public values) — inside the broader Coding / System Design /
  Manager loop. Remote / async / Team-Anywhere evidence is a culture-first
  positive when the role allows. SaaS-collaboration domain familiarity
  (Jira / Confluence / Bitbucket / Trello) is a clear differentiator when
  present.
review_tips: >-
  Atlassian reviewers score each round against published competencies with
  Craft + Values as the two dedicated specialist interviews. Flag: bullets
  that only surface Craft with no Values (teamwork / impact) dimension,
  missing async / Team-Anywhere evidence for distributed-leaning roles, and
  product-frontend résumés without SaaS-collaboration context.
