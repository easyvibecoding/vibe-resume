key: wistron_its
label: 緯創軟體 / Wistron ITS (WITS)
tier: tw_local
locale_hint: zh_TW
must_haves:
- >-
  清楚理解外派 / 駐點模式的職涯節奏 —— WITS 的業務以派駐財星 500 與大型企業
  客戶為主,履歷會先過內部 HR + 主管,再送客戶審一次,需同時滿足兩套標準
- 多樣技術棧的適應力 —— Java / .NET / Python / Cloud / Data 皆有案子
- 能以中文+英文雙語提案,並適應長期外派的合約性質
plus_signals:
- 過往駐點 / 外派專案經驗,並明列「客戶產業 + 技術棧 + 專案規模」
- 外商企業 (半導體、金融、醫療) 導入、ERP 升級、雲端遷移的實戰
- 同時擔任 PM + 開發者雙重角色的能力
- 台灣 / 中國 / 日本 / 美國辦公室跨地合作經驗 (WITS 在四地都有據點)
red_flags:
- 只寫派駐公司名稱而沒有客戶產業 / 技術棧 / 規模細節
- 長期自由接案履歷但無企業導入專案的穩定性證明
- 無法接受駐點或客戶現場上班的硬性條件卻投駐點職
format_rules:
- 中文履歷為主,技術名詞採中英對照
- 1-2 頁;每段駐點經歷寫 客戶產業 + 時間 + 技術棧 + 專案規模 + 成果
- 自家公司 (WITS 或其他) 與駐點客戶清楚分層,不要混寫
keyword_anchors:
- 外派
- 駐點
- SI
- 外商
- ERP
- 雲端遷移
- 客戶專案
- 跨地合作
enrich_bias: >-
  這份履歷將由緯創軟體 WITS 審閱。繁體中文為主,技術名詞中英對照。每段
  駐點經歷要同時呈現兩個面向 —— 對 WITS 內部而言的雇主身分,以及對客戶
  而言的專案貢獻。每個駐點案子列「客戶產業 + 時間 + 技術棧 + 團隊規模 +
  量化成果」。說明接受駐點 / 外派 / 跨地長期出差的意願。
review_tips: >-
  WITS 審閱者會雙重審查:內部適配性 + 客戶方技術可信度。Flag: 派駐公司
  名稱無客戶細節、自由接案為主無企業導入穩定性、拒絕駐點條件卻投派駐職。
  多語能力 (中英日) 與跨地合作經驗是明確加分。
