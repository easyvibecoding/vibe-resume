key: syscom
label: 凌群電腦 / Syscom
tier: tw_local
locale_hint: zh_TW
must_haves:
- >-
  長期 SI 專案經驗 —— 凌群 1975 年創立、2001 上市,主業是政府、金融、電信的
  大型系統整合
- 硬體 + 軟體 + 網路 + 資安 整合規劃能力 (凌群案子常跨層)
- 穩定長任期的職涯訊號 —— 凌群文化傾向穩定,頻繁跳槽會被保守審閱者扣分
plus_signals:
- 政府機關、健保、戶政、稅務系統的整合導入經驗
- 電信計費、銀行核心、ERP / CRM 升級專案
- 資安認證 (CCSP / CISSP / ISO 27001) 或政府專案所需的身分資格
- 全端思考 —— 從網路拓樸、伺服器建置到應用層開發都能參與的 SI 工程師
red_flags:
- 純新創或短任期履歷無大型政府 / 金融案整合經驗
- 只寫開發技術不涉及網路 / 伺服器 / 整合規劃的 SI 履歷
- 形容詞密度過高無量化支持
format_rules:
- 中文履歷為主,技術名詞採中英對照
- 1-2 頁反向時序;每個專案列 客戶類型 + 時間 + 技術層 (硬體/軟體/網路/
  資安/應用) + 專案規模 + 成果
- 證照有限加分但仍可提升第一印象,建議表列
keyword_anchors:
- 凌群
- SI
- 政府案
- 健保
- 金融
- 系統整合
- 資安
- 網路
enrich_bias: >-
  這份履歷將由凌群電腦審閱。繁體中文為主,技術名詞中英對照。突出「系統
  整合」的跨層特質 —— 一個政府 / 金融案子往往同時牽涉硬體、網路、資安、
  應用層,履歷要展現候選人對多層整合的感覺。證照表列有助破冰 (尤其
  社會新鮮人 / 轉職者)。穩定長任期的職涯節奏是 Syscom 文化正向訊號。
review_tips: >-
  凌群審閱者關注長任期穩定性 + 跨層整合能力 + 政府 / 金融產業經驗。Flag:
  短任期頻繁跳槽、只寫應用層開發無 SI 整合視野、無量化成果的形容詞履歷。
  證照與政府專案資格是明確加分,但仍以經驗為王。
