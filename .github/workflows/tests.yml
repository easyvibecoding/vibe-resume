name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install project + dev extras
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q

  powershell:
    name: PSScriptAnalyzer (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path scripts/ -Recurse -Severity Warning,Error
          $results | Format-Table -AutoSize
          if ($results.Count -gt 0) { exit 1 }

      - name: Smoke-test backup script (WhatIf)
        shell: pwsh
        run: pwsh -NoProfile -File scripts\backup_claude_projects.ps1 -WhatIf -ArchiveDir ${{ runner.temp }}\ClaudeArchive
