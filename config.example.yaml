# Extractor toggles & path overrides. All paths are expanded via os.path.expanduser.
scan:
  # When scan_mode = "auto", agent decides the root based on profile.
  # When "full", scan $HOME for every .git. When "whitelist", use scan.roots.
  mode: "full"
  roots:
    - "~/Projects"
    - "~/Code"
    - "~/Developer"
    - "~/sideProject"
  exclude_globs:
    - "**/node_modules/**"
    - "**/.venv/**"
    - "**/venv/**"
    - "**/.next/**"
    - "**/dist/**"
    - "**/build/**"

extractors:
  claude_code:
    enabled: true
    path: "~/.claude/projects"
  claude_code_archive:
    enabled: true
    path: "~/ClaudeCodeArchive/current"
  codex:
    enabled: true
    # Default; respects $CODEX_HOME if your Codex CLI overrides the location.
    path: "~/.codex/sessions"
    # Codex moves sessions here when archived from the TUI — flat directory,
    # not dated. Deduplicated against `path` by session UUID.
    archived_path: "~/.codex/archived_sessions"
  gemini_cli:
    enabled: true
    # Gemini CLI + Antigravity IDE share ~/.gemini/ as the base dir.
    # CLI sessions live under ~/.gemini/tmp/<project_hash>/ — each project
    # dir carries logs.json (user-prompt stream) and an optional chats/
    # subdir with full session-*.json files (richer data).
    # Antigravity conversations/*.pb are protobuf-binary and not yet
    # extractable without the .proto schema; see ROADMAP.md.
    path: "~/.gemini/tmp"
  cursor:
    enabled: true
    path: "~/Library/Application Support/Cursor/User"
  cline:
    enabled: true
    path: "~/Library/Application Support/Code/User/globalStorage/saoudrizwan.claude-dev"
  continue_dev:
    enabled: true
    path: "~/.continue/sessions"
  aider:
    enabled: true
  windsurf:
    enabled: true
    path: "~/.codeium/windsurf/cascade"
  copilot_vscode:
    enabled: true
    path: "~/Library/Application Support/Code/User/workspaceStorage"
  copilot_cli:
    enabled: true
    # GitHub Copilot CLI — respects $COPILOT_HOME if set.
    # Each <uuid>/ contains events.jsonl (session event stream) plus
    # workspace artefacts (plans, checkpoints, tracked files).
    path: "~/.copilot/session-state"
  zed:
    enabled: true
  claude_desktop:
    enabled: true
    path: "~/Library/Application Support/Claude"
  git_repos:
    enabled: true
    # commits authored by these emails count. Leave empty to auto-fill from
    # `git config --global user.email`.
    author_emails: []
  installed_env:
    enabled: false           # reads ~/.claude (plugins/skills) + MCP configs; opt in
  github:
    enabled: false           # network + needs `gh` CLI logged in + account-bound; opt in
    author_logins: []        # empty → gh's currently-authenticated user (@me)
    owned_owners: []         # owners/orgs to treat as "yours" (else PRs count as external/OSS)
    repos_allow: []          # empty → all repos; non-empty → only these owner/repo
    repos_block: []          # owner/repo to exclude
    max_age_days: 1095       # ~3 years
    max_items: 300           # cap PRs+issues (guards search-API rate limit)
    include_issues: true
    fetch_comments: true     # your own review/issue-thread comments
    fetch_files: false       # per-PR changed-file paths (extra API calls)
  cloud_chatgpt:
    enabled: true
    import_dir: "./data/imports/chatgpt"
  cloud_claude_ai:
    enabled: true
    import_dir: "./data/imports/claude"
  cloud_gemini:
    enabled: true
    import_dir: "./data/imports/gemini-takeout"
  cloud_grok:
    enabled: true
    import_dir: "./data/imports/grok"
  cloud_perplexity:
    enabled: true
    import_dir: "./data/imports/perplexity"
  cloud_mistral:
    enabled: true
    import_dir: "./data/imports/mistral"
  cloud_poe:
    enabled: true
    import_dir: "./data/imports/poe"
  image_local:
    enabled: true
    roots:
      - "~/Pictures"
      - "~/Documents"
  suno:
    enabled: false
    api_key_env: "SUNO_API_KEY"
    local_roots:
      - "~/Music/Suno"
      - "~/Downloads"
  elevenlabs:
    enabled: false
    api_key_env: "ELEVENLABS_API_KEY"
  midjourney:
    enabled: true
  runway:
    enabled: false
    api_key_env: "RUNWAY_API_KEY"
  heygen:
    enabled: false
    api_key_env: "HEYGEN_API_KEY"

# Shared knobs for conversation-style extractors (claude_code, codex, claude_ai).
sessions:
  sample_prompts: 12        # how many user prompts to keep per session (spread across timeline)
  per_prompt_chars: 300     # char budget per kept prompt
  capture_tool_args: false  # also keep a sample of tool-call arguments (redacted)
  keep_assistant: true      # claude.ai export: keep assistant responses too

privacy:
  # Strings matching these patterns are redacted from summaries and keywords.
  redact_patterns:
    - "(?i)api[_-]?key[\"':= ]+[A-Za-z0-9_\\-]{16,}"
    - "(?i)secret[\"':= ]+[A-Za-z0-9_\\-]{16,}"
    - "sk-[A-Za-z0-9]{20,}"
    - "cfut_[A-Za-z0-9]{20,}"
    - "xox[abpsr]-[A-Za-z0-9\\-]{10,}"
    - "(?i)password[\"':= ]+\\S+"
    - "[A-Za-z0-9._%+\\-]+@[A-Za-z0-9.\\-]+\\.[A-Za-z]{2,}"
  # project names / paths to exclude entirely
  blocklist:
    - "delegation-eval"
    - "task0"
  # when true, enricher replaces concrete tech names with abstract descriptions.
  # e.g. "PostgreSQL with pgvector" -> "relational DB with vector search"
  abstract_tech: false

emphasis:
  enabled: true     # enrich/render honor _emphasis.yaml when present (--no-emphasis overrides)

curate:
  enabled: true                  # enrich/render prefer _project_groups.curated.json when present
  noise_globs:
    - "**/tmp/**"
    - "**/temp/**"
    - "**/scratch/**"
    - "**/sandbox/**"

# AI-proficiency rubric (#47): enrich + review read a bundled, cited
# market_rubric.yaml (senior-framing keywords, anti-patterns, metric hints).
# No key needed here — it's always on. To override the bundled baseline, drop a
# dated copy at data/cache/market_rubric.yaml (the #46 `research` pass writes
# this); the loader prefers it and warns when it's >180 days stale.

research:
  # Opt-in market-refresh (#46). `vibe-resume research` works regardless of this
  # flag — it documents that the pass does network + LLM work in your Claude Code
  # session (web search + adversarial verify) and writes a cited, dated
  # data/cache/market_rubric.yaml that enrich + review then consume. enrich/review
  # surface a refresh hint once that cache ages past the built-in 180-day threshold.
  enabled: false

# Subagent model tier for tool-spawned fan-outs (#60). Default sonnet — Sonnet
# has its own weekly quota pool (more headroom than Opus), so fan-out work draws
# from a different weekly pool. NOTE (#61): tier choice picks *which weekly pool*,
# it does NOT grant rate-limit isolation — the 429s on wide fan-outs are per-minute
# limits tripped by concurrency. The real fix is batching + backoff (the built-in
# subprocess path retries on 429 honoring retry-after; cap session fan-outs to ~5
# concurrent). Per-command override via `scan.subagent_model` or --subagent-model.
agents:
  subagent_model: "sonnet"   # opus | sonnet | haiku (haiku only when explicitly chosen)

enrich:
  mode: "claude-code-agent"
  batch_size: 20
  include_snippets: false
  input_activities: 12      # how many activities per group feed the LLM prompt
  input_char_budget: 200    # per-activity char budget in the prompt

stats:
  # Windows (in days) to roll up. 30 matches Claude Code's default cleanup window,
  # so lifetime numbers and last-30d numbers should be contrasted.
  windows:
    - 30
    - 7

render:
  default_format: "md"
  # page_budget: optional float — tighten bullet density (achievements/group) to
  # hit a page target, composing with detailed_projects/--top-n. CLI: --max-pages.
  # Drops the least-representative bullets only; never pads (see docs/PRINCIPLES.md P1.4).
  # page_budget: 2.0
  # templates_dir: optional override; templates ship inside the package
  output_dir: "./data/resume_history"
  draft_dir: "./data/drafts"
  # keep last N versions before auto-prune (0 = keep all)
  max_versions: 0
  # Default locale when neither `--locale` nor `profile.preferred_locale` is set.
  # Supported: en_US | en_GB | zh_TW | zh_CN | ja_JP | ko_KR | de_DE | fr_FR
  # Resolution priority: CLI --locale  >  profile.preferred_locale  >  this value  >  en_US.
  locale: "en_US"
  # When `vibe-resume render --all-locales` runs, produce each locale in these
  # formats. Use ["md"] for the fastest batch (default). Set ["md", "docx"]
  # to also get the Word doc per locale, or ["all"] for md + docx + pdf.
  # CLI `--format` overrides this for a single run.
  all_locales_formats: ["md"]
